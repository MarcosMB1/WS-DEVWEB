<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formulário de Cadastro</h1>
    <form action="/" method="post">
        <label for="nome">Nome Completo:</label>
        <input type="text" name="nome" id="nome" placeholder="Digite o Seu Nome Completo"><br>
        <label for="email">E-mail:</label>
        <input type="text" name="email" id="email" placeholder="Digite o Seu E-mail"><br>
        <label for="telefone">Telefone:</label>
        <input type="text" name="telefone" id="telefone"><br>
        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha"><br>
        <label for="idade">Idade</label>
        <input type="number" name="idade" id="idade"><br>
        <label for="genero">Gênero</label>
        <select name="genero" id="genero" required>
            <option value=""select disabled>Selecione......</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
            <option value="outro">Outro</option>
        </select> 
        <br>
        <h2>Intereses</h2>
        <input type="checkbox" name="intereses" id="tecnologia"
        value="tecnologia">
        <label for="tecnologia">Tecnologia</label>
        <input type="checkbox" name="intereses" id="Jogos"
        value="jogos">
        <label for="jogos">Jogos</label>
        <input type="checkbox" name="intereses" id="musica">
        <label for="musica">Música</label>
        <br>
        <label for="newslette">Deseja Receber Nossa Newsletter</label>
        <input type="radio" name="newsletter" id="newslette" value="sim">
        <label for="sim">Sim</label>
        <input type="radio" name="newsletter" id="newslette" value="nao">
        <label for="sim">Não</label>
        <br>
        <h2>Informações Adicionais</h2>
        <label for="sonho">Sonhos</label>
        <textarea name="sonho" id="sonho" rows="5" cols="20" placeholder="Conte-nos o Seu Sonho"></textarea>
        <br>
        <label for="cor">Cor Favorita:</label>
        <input type="color" name="cor" id="cor">
        <br>
        <label for="data">Data De Nascimento</label>
        <input type="date" name="data" id="data">
        <br>
        <label for="arquivo">Envie Uma Foto</label>
        <input type="file" name="arquivo" id="arquivo">
       
        


        <button type="submit">Enviar formulário</button>
    </form>
</body>
</html>
