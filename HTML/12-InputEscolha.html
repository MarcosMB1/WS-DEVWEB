<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Escolha</title>
</head>
<body>
    <h1>Input Escolha</h1>
    <form action="./">
    <label for="opcao"><input type="radio">Opção 01</label>
    <label for="opcao"><input type="radio">Opção 02</label>
    <label for="opcao"><input type="radio">Opção 03</label>
    <label for="opcoes"><br>
        <input type="checkbox" name="opcoes" id="opcao1">Opção 01
    </label>
    <label for="opcoes">
        <input type="checkbox" name="opcoes" id="opcao2">Opção 02
    </label>
    <label for="opcoes">
        <input type="checkbox" name="opcoes" id="opcao3">Opção 03
    </label>
    </form>
</body>
</html>
