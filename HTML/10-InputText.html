<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Text/title>
</head>
<body>
    <h1>Input Text</h1>
    <label for="nome">Nome:</label>
    <input type="text" id="nome">
    <input type="text" id="nome" placeholder="Digite o Seu Nome" value="Marcos" maxlength="10" minlength="3" required readonly>
    <input type="text" id="sobrenome" placeholder="Digite Seu Sobrenome" autofocus disabled name="nome">
    <input type="text" id="apelido" placeholder="Digite o Seu Apelido" pattern="[A-Za-z]+"title="Aqui Você Pode Digitar Um Apelido">
</body>
</html>
