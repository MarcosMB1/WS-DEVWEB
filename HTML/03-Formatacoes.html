<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações</title>
</head>
<body>
    Primeira Linha<br>Segunda Linha
    <strong>Texto em Negrito Semântico</strong><br/>
    <b>texto em negrito sem semâtico</b><br/>

    <em>texto em italico semântico</em><br/>
    <i>texto em italico sem semanticas</i><br/>

    <del>texto tachado semântico</del><br/>
    <s>texto tachado sem semânticas</s><br/>

    <u>Texto sublinhados</u><br/>
    X<sup>2</sup><br/>
    H<sub>2</sub>0<br>
    <code><console.log("Hello World!");</code><br>
    <blockquote>Citação em bloco</blockquote><br/>
    <q>Citação curta</q><br/>
</body><br/>
</html><br/>
