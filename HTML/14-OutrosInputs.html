<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Outros Inputs</h1>
    <label for="cor">Cor</label>
    <input type="color" name="cor" id="cor"><br>
    <label for="data">Data</label>
    <input for="date" name="data" id="data"><br>
    <label for="email">E-mail</label>
    <input for="email" name="email" id="email" placeholder="Digite Um email"><br>
    <label for="url">URl</label>
    <input type="url" name="url" id="url" placeholder="https://"><br>
    <label for="bio">Biografia</label>
    <textarea name="bio" id="bio" rows="5" cols="30" placeholder="Escreva Sua Biografia"></textarea>

</body>
</html>
