<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Semânticas</title>
</head>
<body>
    <h1>Tabelas Semânticas</h1>
    <table border=8>
        <caption>
            Título Tabela
        </caption>
        <thead>
            <tr>
            <th scope="col">Título 1</th>
            <th scope="col">Título 2</th>
            <th scope="col">Título 3</th>
            </tr>
         </thead>
         <tbody>
            <tr>
                <th scope="row" rowspan="2">Subtítulo</th>
                <td>Dado 1</td>
                <td>Dado 2</td>
            </tr>
            <tr>
                <td>Dado 3</td>
                <td>Dado 4</td>
            </tr>
         </tbody>
         <tfoot>
            <tr>
                <th scope="row" colspan="3">Rodapé</th>
            </tr>
         </tfoot>
    </table>
</body>
</html>
