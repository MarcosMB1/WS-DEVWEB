<body>
    <h1>Formulário Avançado</h1>
    <label for="nome">Nome Completo:</label>
        <input type="text" name="nome" id="nome" placeholder="Digite o Seu Nome Completo"><br>
    <label for="email">E-mail:</label>
        <input type="text" name="email" id="email" placeholder="Digite o Seu E-mail"><br>
    <label for="senha">Senha:</label>
        <input type="text" name="senha" id="senha" placeholder="Crie Uma Senha"><br> 
    <label for="DatadeNascimento">Data De Nascimento:</label>
        <input type="text" name="DatadeNascimento" id="datadenascimento" placeholder="Digite Sua Data De Nascimento"><br> 
    <label for="genero">Gênero:</label>
        <select name="genero" id="genero" required>
            <option value=""select disabled>Selecione......</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
        <input type="checkbox" name="Aceito Termos De Uso" id="Termos de Uso" value="Termos de Uso">
    <button>Cadastrar</button><br>
</body>
