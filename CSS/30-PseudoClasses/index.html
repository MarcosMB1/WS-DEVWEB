<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PseudoClasses</h1>
    <h2>:hover</h2>
    <button>PRESS START</button>
    <hr/>
    <h2>:focus</h2>
    <input type="text" placeholder="PRESS START">
    <hr/>
    <h2>:active</h2>
    <button>Clique e Segure</button>
    <hr/>
    <h2>:visited</h2>
    <a href="https://store.steampowered.com/?l=portuguese">PRESS START</a>
    <hr/>
    <h2>Checked</h2>
    <label>
        <input type="checkbox">
        Clique
    </label>
    <hr/>
    <h2>:disabled</h2>
    <input type="text" value="Desativado" disabled>
    <hr/>
    <h2>:first-child, :last-child, :nth-child(n)</h2>
    <ul>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
        <li>Quarto</li>
    </ul>
</body>
</html>
