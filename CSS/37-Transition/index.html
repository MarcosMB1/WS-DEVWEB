<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transições</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TRANSIÇÕES</h1>
    <div class="container">
        <div class="bloco">
            <h2>Transition</h2>
            <button class="b-transition">TRANSMITION</button>
            <p>Realiza Uma Transição Suave</p>
        </div>
        <div class="bloco">
            <h2>Transition Property</h2>
            <button class="b-property">MUDAR TAMANHO</button>
            <p>Anima a Cor De Fundo</p>
        </div>
        <div class="bloco">
            <h2>Transition Duration</h2>
            <button class="b-duration">AUMENTAR</button>
            <p>Ação demora mais a acontecer</p>
        </div>
        <div class="bloco">
            <h2>Transition Delay</h2>
            <button class="b-delay">ATRASO</button>
            <p>Ação atrasa para acontecer</p>
        </div>
        <div class="bloco">
            <h2>Transition Timing</h2>
            <button class="b-timing">MOVER</button>
            <p>o Movimento termina e começa de forma suave</p>
        </div>
        <div class="bloco card-animado">
            <h2>Card Animado</h2>
            <p>Este Bloco Fica Animado</p>
        </div>
    </div>
</body>
</html>
