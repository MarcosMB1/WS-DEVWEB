<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Transform</h1>
    <div class="container">
        <div class="bloco">
            <h2>Translate</h2>
            <div class="caixa translate">
                MOVER
            </div>
            <p>Move um Elemento</p>
        </div>
        <div class="bloco">
            <h2>Scale</h2>
            <div class="caixa scale">
                AUMENTA
            </div>
            <p>Aumenta Ou Diminui um Elemento</p>
        </div>
        <div class="bloco">
            <h2>Rotate</h2>
            <div class="caixa rotate">
                GIRAR
            </div>
            <p>Gira Visualmente um Elemento</p>
        </div>
        <div class="bloco">
            <h2>Skew</h2>
            <div class="caixa skew">
                INCLINAR
            </div>
            <p>Inclina um Elemento</p>
        </div>
        <div class="bloco">
            <h2>Ação Com Hover</h2>
            <div class="caixa hover">
                Ação Com Hover
            </div>
        </div>
            <h2>Botão Com Hover</h2>
        <div class=" bloco">
           <h2>Botão com Hover</h2>
           <button class="botao">BOTÃO COM HOVER</button>
           <p>Botão Altera Ao Passar O Mouse</p>
        </div>
    </div>
</body>
</html>
